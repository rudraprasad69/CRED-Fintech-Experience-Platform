<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Premium Phone UI Mock</title>
    <style>
      :root {
        --bg: #050607;
        --panel: #111316;
        --panel-border: rgba(255, 255, 255, 0.08);
        --soft-text: #8d919b;
        --hard-text: #f7f8fb;
        --accent: #60ffb8;
        --blue-1: #111e5f;
        --blue-2: #0e163e;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(1200px 600px at 50% 110%, #202430 0%, #0a0b0f 45%, #020202 100%);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
        color: var(--hard-text);
      }

      .phone {
        width: 420px;
        height: 860px;
        border-radius: 52px;
        background:
          linear-gradient(160deg, #0f1116 0%, #060709 45%, #020203 100%);
        border: 2px solid #30343b;
        box-shadow:
          0 40px 85px rgba(0, 0, 0, 0.78),
          0 0 0 7px rgba(255, 255, 255, 0.03),
          inset 0 0 0 1px rgba(255, 255, 255, 0.04);
        position: relative;
        overflow: hidden;
      }

      .phone::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 42%;
        background: radial-gradient(85% 65% at 50% 0%, rgba(255, 255, 255, 0.08), transparent 72%);
        pointer-events: none;
      }

      .notch {
        width: 132px;
        height: 34px;
        background: #020202;
        border-radius: 0 0 18px 18px;
        position: absolute;
        left: 50%;
        transform: translateX(-50%);
        top: 0;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.55);
        z-index: 2;
      }

      .screen {
        height: 100%;
        padding: 78px 28px 28px;
        position: relative;
      }

      .status {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 34px;
        color: var(--soft-text);
      }

      .shield {
        width: 26px;
        height: 30px;
        border: 2.5px solid #f1f3f7;
        border-radius: 12px 12px 14px 14px;
        clip-path: polygon(50% 0, 100% 15%, 100% 58%, 50% 100%, 0 58%, 0 15%);
      }

      .time {
        font-size: 28px;
        font-weight: 500;
        letter-spacing: 0.02em;
        color: rgba(238, 240, 246, 0.35);
      }

      .card-score {
        background: linear-gradient(160deg, rgba(20, 33, 112, 0.88), rgba(8, 17, 49, 0.95));
        border: 1px solid rgba(110, 130, 255, 0.18);
        border-radius: 24px;
        padding: 30px;
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.05),
          0 14px 24px rgba(6, 11, 35, 0.45);
      }

      .label {
        text-align: center;
        text-transform: uppercase;
        letter-spacing: 0.16em;
        font-size: 24px;
        color: rgba(221, 227, 255, 0.72);
      }

      .score {
        margin: 6px 0;
        text-align: center;
        font-size: 76px;
        font-weight: 700;
        line-height: 1.05;
        letter-spacing: 0.02em;
      }

      .delta {
        text-align: center;
        font-size: 30px;
        color: rgba(209, 219, 255, 0.74);
      }

      .grid {
        margin-top: 24px;
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
      }

      .stat {
        background: linear-gradient(160deg, rgba(255, 255, 255, 0.06), rgba(255, 255, 255, 0.03));
        border: 1px solid var(--panel-border);
        border-radius: 20px;
        padding: 22px 20px;
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.03);
      }

      .stat .k {
        margin: 0;
        text-transform: uppercase;
        letter-spacing: 0.12em;
        font-size: 24px;
        color: #8f949d;
      }

      .stat .v {
        margin: 12px 0 0;
        font-size: 48px;
        font-weight: 700;
        line-height: 1;
      }

      .mint {
        color: var(--accent);
      }

      @media (max-width: 520px) {
        .phone {
          transform: scale(0.9);
        }
      }
    </style>
  </head>
  <body>
    <main class="phone" aria-label="Premium phone UI mockup">
      <div class="notch"></div>

      <section class="screen">
        <header class="status">
          <div class="shield" aria-hidden="true"></div>
          <div class="time">12:45</div>
        </header>

        <section class="card-score">
          <p class="label">Credit Score</p>
          <p class="score">798</p>
          <p class="delta">↑ 12 pts this month</p>
        </section>

        <section class="grid">
          <article class="stat">
            <p class="k">Cred Coins</p>
            <p class="v">24,500</p>
          </article>

          <article class="stat">
            <p class="k">Savings</p>
            <p class="v mint">₹3,200</p>
          </article>

          <article class="stat">
            <p class="k">Due Date</p>
            <p class="v">May 15</p>
          </article>

          <article class="stat">
            <p class="k">Bill</p>
            <p class="v">₹24K</p>
          </article>
        </section>
      </section>
    </main>
  </body>
</html>
